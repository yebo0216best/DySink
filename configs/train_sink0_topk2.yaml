# ============================================================================
# Experiment B: sink_size=0, memory_top_k=2
# No fixed sink block, dynamically retrieve 2 most similar blocks from memory bank
# ============================================================================

# Stage 2 (long video training) has been merged into Stage 3
# Now we train directly from Stage 1 checkpoint with LoRA
generator_ckpt: /XXX/dysink/stage1_model.pt

# reset_step: true
# auto_resume: false

generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
real_name: Wan2.1-T2V-14B
fake_name: Wan2.1-T2V-1.3B
text_encoder_fsdp_wrap_strategy: size
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow
mixed_precision: true
seed: 0
wandb_key: YOUR_WANDB_KEY
wandb_entity: YOUR_WANDB_ENTITY
wandb_project: YOUR_WANDB_PROJECT
sharding_strategy: hybrid_full

lr: 1.0e-05
lr_critic: 2.0e-06
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999

# Two prompt files for switch training (no callback)
data_path: /XXX/longlive-1.3B/prompts/vidprom_filtered_extended.txt
switch_prompt_path: /XXX/longlive-1.3B/prompts/vidprom_filtered_extended_switch.txt

batch_size: 1
gradient_accumulation_steps: 1
ema_weight: 0.99
ema_start_step: 0
total_batch_size: 32
log_iters: 100
max_checkpoints: 80
max_iters: 10000

negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'
dfake_gen_update_ratio: 5
image_or_video_shape:
- 1
- 240 # unused in streaming training
- 16
- 60
- 104

# Use dmd_callback distribution loss (supports memory mechanism even without callback)
distribution_loss: dmd_callback
global_sink: false
trainer: score_distillation
gradient_checkpointing: true
num_frame_per_block: 3
load_raw_video: false
model_kwargs:
  timestep_shift: 5.0
  local_attn_size: 9
  sink_size: 0           
  # Sink Anomaly Gate: if retrieved dynamic-sink KV attracts too many
  # heads compared with local-window KV, fall back to local-window KV only.
  sink_anomaly_gate: true
  sink_anomaly_threshold: 0.7

# Visualization
vis_interval: 100
vis_ema: false
vis_video_lengths:
- 240
val_batch_size: 1
val_data_path: /XXX/longlive-1.3B/prompts/vidprom_filtered_extended.txt
val_switch_prompt_path: /XXX/longlive-1.3B/prompts/vidprom_filtered_extended_switch.txt

slice_last_frames: 21

# Single switch point for two segments (no callback)
switch_mode: random_choice
switch_choices:
- 21
- 39
- 57
- 75
- 93
- 111
- 129
- 147
- 165
- 183
- 201

streaming_training: true
streaming_chunk_size: 21
streaming_max_length: 240

streaming_min_new_frame: 18
train_first_chunk: true

last_step_only: false

# Memory settings
# [Exp B] sink_size=0 (no fixed block) + memory_top_k=2 (2 retrieved blocks)
# If the bank has fewer than memory_top_k blocks, local attention is temporarily
# expanded by the missing block count (in units of num_frame_per_block).
use_memory_in_training: true
memory_top_k: 2             # [Exp B] Retrieve 2 most similar blocks from memory bank

# Memory Deduplication Configuration
memory_dedup_threshold: 0.9

# Memory Encoder Configuration (PE-Core Vision Encoder, visual-only)
memory_encoder_pe_config: "PE-Core-S16-384"
memory_encoder_pe_checkpoint: "/XXX/PE-Core-S16-384/PE-Core-S16-384.pt"

## LoRA Configuration - LoRA for Stage 3 (training directly from Stage 1)
adapter:
  type: "lora"
  rank: 256                    
  alpha: 256                   
  dropout: 0.0
  dtype: "bfloat16"
  apply_to_critic: true
  verbose: true
